[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/airtable"
  to = "/.netlify/functions/airtable-api"
  status = 200
  force = true

[[redirects]]
  from = "/api/submit-baseline"
  to = "/.netlify/functions/submit-baseline"
  status = 200
  force = true
